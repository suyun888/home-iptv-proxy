services:
  xhsuhd:
    image: iptvtop/xhsuhd:latest
    container_name: xhsuhd
    restart: always
    ports:
      - "34567:34567"
    env_file:
      - ./config/xhsuhd.env

  iptv-4gtv-system:
    image: ${FOURGTV_IMAGE:-instituteiptv/iptv-4gtv-system:latest}
    container_name: iptv-4gtv-system
    restart: always
    ports:
      - "${FOURGTV_PORT:-19950}:5050"
    volumes:
      - ./config/4gtv-cache:/data/cache
    environment:
      SEGMENTS_WINDOW: "${FOURGTV_SEGMENTS_WINDOW:-8}"
      FETCH_TIMEOUT: "${FOURGTV_FETCH_TIMEOUT:-4}"
      ACCESS_TOKEN: "${FOURGTV_ACCESS_TOKEN:-change-this-token}"

  home-iptv-proxy:
    image: ghcr.io/suyun888/home-iptv-proxy:latest
    container_name: home-iptv-proxy
    restart: always
    ports:
      - "28788:8787"
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/app/deploy/docker-compose.yml:ro
    environment:
      IPTV_CONFIG: /app/config/sources.yaml
      IPTV_IMAGE_NAME: ghcr.io/suyun888/home-iptv-proxy:latest
      IPTV_AUTO_UPDATE_ENABLED: "true"
      IPTV_UPDATE_COMMAND: docker compose -f /app/deploy/docker-compose.yml pull home-iptv-proxy && docker compose -f /app/deploy/docker-compose.yml up -d home-iptv-proxy
      IPTV_XHS_APPLY_COMMAND: docker compose -f /app/deploy/docker-compose.yml up -d xhsuhd

  watchtower:
    image: containrrr/watchtower:latest
    container_name: home-iptv-proxy-watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOCKER_API_VERSION: "1.40"
    command: home-iptv-proxy iptv-4gtv-system --cleanup --interval 3600
